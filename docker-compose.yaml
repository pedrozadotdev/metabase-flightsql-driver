version: "2.4"

services:
  builder:
    build:
      context: .
      dockerfile: Dockerfile.lein
    working_dir: /builder
    volumes:
      - jar-volume:/builder/target
      - .:/builder
    command: >
        sh -c "set -x &&
              rm -f /builder/target/metabase-flightsql-driver-0.1.0-SNAPSHOT-standalone.jar &&
              lein uberjar"
    restart: "no"

  metabase:
    image: metabase/metabase:v0.55.7
    container_name: metabase
    hostname: metabase
    depends_on:
      - postgres
      - spiced
      - gizmosql
      - builder
    volumes:
      - jar-volume:/builder/target
      - /dev/urandom:/dev/random:ro
    command: >
      sh -c "while [ ! -f /builder/target/metabase-flightsql-driver-0.1.0-SNAPSHOT-standalone.jar ]; do
              echo 'Waiting for jar file...';
              sleep 5;
            done &&
            sleep 10 &&
            cp /builder/target/metabase-flightsql-driver-0.1.0-SNAPSHOT-standalone.jar /plugins/flightsql-metabase-driver.jar &&
            echo 'Plugin copied, starting Metabase' &&
            exec /app/run_metabase.sh"
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabaseappdb
      MB_DB_PORT: 5432
      MB_DB_USER: metabase
      MB_DB_PASS: mysecretpassword
      MB_DB_HOST: postgres
    networks:
      - metanet1
    healthcheck:
      test: ["CMD", "curl", "--fail", "-I", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:17.4
    container_name: postgres
    hostname: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: metabase
      POSTGRES_DB: metabaseappdb
      POSTGRES_PASSWORD: mysecretpassword
    networks:
      - metanet1

  spiced:
    image: spiceai/spiceai:1.0.6
    container_name: spiced-container
    privileged: true
    user: root
    # this tmpfs prevents an error when the setup script of the dockerfile tries to create this folder after an initial run
    tmpfs:
      - /spice_sandbox
    volumes:
      - type: bind
        source: ./spicepod.yaml
        target: /app/spicepod.yaml
      - type: bind
        source: ./data
        target: /app/data
    command: "--http 0.0.0.0:8090 --metrics 0.0.0.0:9090 --flight 0.0.0.0:50051"
    ports:
      - "50051:50051"
      - "8090:8090"
      - "9090:9090"
    networks:
      - metanet1

  gizmosql:
    image: gizmodata/gizmosql:latest
    container_name: gizmosql
    hostname: gizmosql
    volumes:
      - type: bind
        source: ./gizmosql-init.sql
        target: /opt/gizmosql/init.sql
    environment:
      TLS_ENABLED: "false"
      GIZMOSQL_USERNAME: "gizmosql"
      GIZMOSQL_PASSWORD: "gizmosql_password"
      PRINT_QUERIES: "1"
      DATABASE_FILENAME: ":memory:"
      INIT_SQL_COMMANDS_FILE: "/opt/gizmosql/init.sql"
    ports:
      - "31337:31337"
    networks:
      - metanet1

networks:
  metanet1:
    driver: bridge

volumes:
  pgdata:
  jar-volume:
