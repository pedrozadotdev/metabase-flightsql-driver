info:
  name: Metabase Arrow Flight SQL Driver
  version: 1.0.0-SNAPSHOT-1.0.0
  description: Allows Metabase to connect to databases via the Apache Arrow Flight SQL JDBC driver.

driver:
  name: arrow-flight-sql
  display-name: Arrow Flight SQL
  lazy-load: true
  parent: sql-jdbc
  contact-info: "https://github.com/J0hnG4lt/metabase-flightsql-driver/issues"
  connection-properties:
    - name: host
      display-name: Host
      placeholder: "localhost"
      required: true
    - name: port
      display-name: Port
      placeholder: "443"
      type: integer
      required: true

    - name: username
      display-name: Username (optional)
      required: false

    # Use the built-in password template; put overrides INSIDE the merge list
    - merge:
        - password
        - display-name: Password (optional)
        - required: false

    # Token as a secret field using the same password template
    - merge:
        - password
        - name: token
        - display-name: Token (optional)
        - required: false

    - name: useEncryption
      display-name: Use Encryption
      type: boolean
      default: true
    - name: disableCertificateVerification
      display-name: Disable Certificate Verification
      type: boolean
      default: false

    - advanced-options-start
    - merge:
        - additional-options
        - placeholder: "threadPoolSize=1"
    - default-advanced-options

init:
  - step: load-namespace
    namespace: metabase.driver.arrow-flight-sql
  - step: register-jdbc-driver
    class: org.apache.arrow.driver.jdbc.ArrowFlightJdbcDriver